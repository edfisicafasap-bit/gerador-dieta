<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Dieta - Teste de Integração</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <style>
        body { background:#000; color: #fff; font-family: Arial, sans-serif; padding: 20px; }
        .container { max-width: 600px; margin: auto; }
        h2 { color: #FFD700; text-align: center; }
        label { display: block; margin-top: 15px; color: #FFD700; font-weight: bold; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border-radius: 6px; border: 1px solid #333; background: #111; color: #fff; box-sizing: border-box; }
        #btn-gerar { width: 100%; margin-top: 25px; padding: 18px; background: #FFD700; border: none; font-weight: bold; cursor: pointer; border-radius: 8px; }
        #resultado-debug { display: none; margin-top: 20px; padding: 15px; background: #111; border: 2px solid #ff0000; color: #00ff00; white-space: pre-wrap; font-family: monospace; }
        .item-alimento { display: block; margin: 5px 0; font-size: 14px; }
        .item-alimento input { width: auto; margin-right: 10px; }
        #payment-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; flex-direction: column; justify-content: center; align-items: center; }
    </style>
</head>
<body onload="inicializarTudo()">

<div id="payment-overlay">
    <div style="background: #222; padding: 20px; border-radius: 10px; text-align: center;">
        <h3>PAGAMENTO NECESSÁRIO</h3>
        <button onclick="iniciarCheckout('unica')">Pagar R$ 9,90</button>
        <p onclick="document.getElementById('payment-overlay').style.display='none'">Cancelar</p>
    </div>
</div>

<div class="container">
    <h2>🍎 Validador de Dados</h2>
    
    <label>Nome:</label>
    <input type="text" id="nome_usuario">

    <label>Peso (kg):</label>
    <input type="number" id="peso">
    
    <label>Calorias Alvo:</label>
    <input type="number" id="calorias">
    
    <label>Objetivo:</label>
    <select id="objetivo">
        <option value="Emagrecimento">Emagrecimento</option>
        <option value="Hipertrofia">Hipertrofia</option>
    </select>

    <div id="alimentos-box" style="margin-top: 20px; border: 1px solid #333; padding: 10px;">
        <p style="color: #FFD700; font-weight: bold;">Selecione alguns alimentos para o teste:</p>
        <label class="item-alimento"><input type="checkbox" name="alimento" value="Frango"> Frango</label>
        <label class="item-alimento"><input type="checkbox" name="alimento" value="Arroz"> Arroz</label>
        <label class="item-alimento"><input type="checkbox" name="alimento" value="Ovos"> Ovos</label>
        <label class="item-alimento"><input type="checkbox" name="alimento" value="Banana"> Banana</label>
    </div>

    <button id="btn-gerar" onclick="verificarAcessoEPagar()">GERAR E VER PROMPT</button>

    <div id="resultado-debug"></div>
</div>

<script>
    const S_URL = 'https://xyqqngskrjzhxbsackul.supabase.co';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh5cXFuZ3Nrcmp6aHhic2Fja3VsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk5NTI3NzksImV4cCI6MjA4NTUyODc3OX0.B90q1Jv-vodVIV_dLFUCOekyshrv3HekVpPugpPaHRI';
    const _supabase = supabase.createClient(S_URL, S_KEY);

    // FUNÇÃO QUE PEGA DADOS DA URL (SUA FUNÇÃO ORIGINAL)
    function capturarDadosDaURL() {
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('peso')) document.getElementById('peso').value = urlParams.get('peso');
        if (urlParams.has('calorias')) document.getElementById('calorias').value = urlParams.get('calorias');
        if (urlParams.has('nome')) document.getElementById('nome_usuario').value = urlParams.get('nome');
        if (urlParams.has('objetivo')) document.getElementById('objetivo').value = urlParams.get('objetivo');
    }

    // FUNÇÃO SNAPSHOT (PEGA O QUE ESTÁ NA TELA AGORA)
    function tirarSnapshot() {
        const dados = {
            nome: document.getElementById('nome_usuario').value,
            peso: document.getElementById('peso').value,
            calorias: document.getElementById('calorias').value,
            objetivo: document.getElementById('objetivo').value,
            alimentos: Array.from(document.querySelectorAll('input[name="alimento"]:checked')).map(i => i.value)
        };
        localStorage.setItem('snapshot_teste', JSON.stringify(dados));
        return dados;
    }

    async function inicializarTudo() {
        capturarDadosDaURL(); // 1. Preenche com o que veio do outro site
        
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('pago') === 'true') {
            const salvo = JSON.parse(localStorage.getItem('snapshot_teste'));
            if (salvo) exibirPromptFinal(salvo);
        }
    }

    async function verificarAcessoEPagar() {
        const dados = tirarSnapshot(); // Salva o que está na tela (seja da URL ou editado)
        
        const email = prompt("Confirme seu e-mail para gerar:");
        if(!email) return;
        localStorage.setItem('email_verificacao', email);

        let { data: user } = await _supabase.from('Usuarios_Dieta').select('*').eq('email', email.toLowerCase().trim()).maybeSingle();

        if (!user || !user.pago) {
            document.getElementById('payment-overlay').style.display = 'flex';
        } else {
            exibirPromptFinal(dados);
        }
    }

    function exibirPromptFinal(d) {
        const debugBox = document.getElementById('resultado-debug');
        const promptTexto = `
--- CONTEÚDO ENVIADO PARA A IA ---
NOME: ${d.nome || 'Vazio'}
PESO CAPTURADO: ${d.peso} kg
CALORIAS CAPTURADAS: ${d.calorias} kcal
OBJETIVO: ${d.objetivo}
ALIMENTOS QUE A IA VAI USAR: ${d.alimentos.join(', ') || 'NENHUM SELECIONADO'}

COMANDO: "Crie uma dieta de ${d.calorias} calorias para ${d.nome} focando em ${d.objetivo}."
----------------------------------
        `;
        debugBox.innerText = promptTexto;
        debugBox.style.display = 'block';
    }

    function iniciarCheckout(tipo) {
        tirarSnapshot(); // Garante o salvamento antes de sair da página
        const email = localStorage.getItem('email_verificacao');
        window.location.href = `https://buy.stripe.com/test_exemplo?prefilled_email=${email}`;
    }
</script>

</body>
</html>
