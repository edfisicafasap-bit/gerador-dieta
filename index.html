<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">

    <title>Reeducação Alimentar</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { background:#000; margin:0; font-family:Arial, sans-serif; color: #fff; padding-bottom: 30px; }
        .container { max-width:600px; margin:auto; padding:20px; background:#000; position: relative; }
        h2 { color:#FFD700; text-align: center; margin-bottom: 5px; font-size: 19px; text-transform: uppercase; }
        p.subtitle { text-align: center; color: #ccc; font-size: 14px; margin-bottom: 25px; }
        label { display:block; margin-top:18px; font-size:14px; font-weight: bold; color: #eee; }
        input, select, textarea { width:100%; padding:12px; margin-top:6px; border-radius:6px; border:1px solid #333; background: #111; color: #fff; font-size: 15px; box-sizing: border-box; }
        
        #btn-gerar { width:100%; margin-top:30px; padding:18px; background:#FFD700; border:none; border-radius:8px; font-size:16px; font-weight:bold; color:#000; cursor: pointer; transition: 0.3s; text-transform: uppercase; }
        #btn-gerar:disabled { background: #555; cursor: not-allowed; }
        
        #btn-download-pos-geracao, #btn-download-direto { 
            width:100%; margin-top:20px; padding:18px; background:#000; border: 2px solid #FFD700; border-radius:8px; 
            font-size:16px; font-weight:bold; color:#FFD700; cursor: pointer; text-transform: uppercase; transition: 0.3s;
        }
        #btn-download-pos-geracao:hover, #btn-download-direto:hover { background: #FFD700; color: #000; }

        #status-topo { display: none; background: #FFD700; color: #000; padding: 15px; border-radius: 8px; text-align: center; font-weight: bold; margin-bottom: 20px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }

        #payment-overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); 
            z-index: 9999; flex-direction: column; justify-content: center; align-items: center; padding: 20px; 
        }

        .payment-card { background: #1e1e1e; padding: 30px; border-radius: 15px; text-align: center; max-width: 350px; border: 1px solid #333; }

        .categoria-pai { color: #FFD700; font-size: 15px; font-weight: bold; margin: 25px 0 10px 0; padding-left: 10px; text-transform: uppercase; border-left: 3px solid #FFD700; }
        details { background: #0a0a0a; border: 1px solid #222; border-radius: 8px; margin-bottom: 6px; overflow: hidden; }
        summary { padding: 12px; cursor: pointer; color: #fff; font-weight: normal; font-size: 13px; text-transform: uppercase; list-style: none; display: flex; justify-content: space-between; align-items: center; }
        summary::after { content: '▼'; font-size: 10px; color: #FFD700; transition: 0.3s; }
        details[open] summary::after { transform: rotate(180deg); }
        .grid-alimentos { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 0 12px 12px 12px; }
        .item-alimento { display: flex; align-items: center; font-size: 12px; color: #bbb; cursor: pointer; padding: 4px 0; }
        .item-alimento input { width: auto; margin: 0 8px 0 0; }

        .secao-especial { background: #111; border: 1px dashed #FFD700; padding: 15px; border-radius: 8px; margin: 20px 0; }
        .secao-especial h4 { margin-top: 0; color: #FFD700; font-size: 14px; }
        #resultado { margin-top: 30px; white-space: pre-wrap; background: #111; padding: 20px; border-radius: 8px; display: none; border: 1px solid #FFD700; font-size: 14px; line-height: 1.6; }

        .btn-suporte {
            position: fixed; bottom: 20px; right: 20px; background: #25d366; color: white; padding: 12px 20px;
            border-radius: 50px; text-decoration: none; font-size: 14px; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.5); z-index: 1000;
        }

        .login-shortcut {
            position: absolute; top: 15px; right: 20px; cursor: pointer; color: #FFD700; background: rgba(255, 215, 0, 0.1);
            padding: 8px; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 100;
        }
    </style>
</head>
<body onload="inicializarTudo()">

<a href="https://wa.me/5522992587653" target="_blank" class="btn-suporte">SUPORTE</a>

<div id="payment-overlay">
    <div class="payment-card">
        <h2 style="font-size: 24px; color: #FFD700; margin-top: 0;">LIBERAR ACESSO! 🚀</h2>
        <p style="color: #eee; margin-bottom: 25px; font-size: 15px;">Escolha um plano:</p>
        <button style="width: 100%; padding: 15px; border-radius: 8px; font-weight: bold; background: #fff; color: #000; cursor: pointer;" onclick="iniciarCheckout('price_1Sz1w7GEaACih56ZWyTiPBAu')">🥗 DIETA ÚNICA - R$ 9,90</button>
        <div style="margin-top: 15px;"></div>
        <button style="width: 100%; padding: 15px; border: 2.5px solid #FFD700; border-radius: 8px; font-weight: bold; background: #fff; color: #000; cursor: pointer;" onclick="iniciarCheckout('price_1SzPP7GEaACih56ZkwV5mxN2')">📅 ACESSO ANUAL - R$ 29,90</button>
        <p style="margin-top: 30px; font-size: 12px; color: #888; cursor: pointer; text-decoration: underline;" onclick="fecharModal()">← Voltar e editar</p>
    </div>
</div>

<div class="container">
    <div class="login-shortcut" onclick="alternarBuscaRapida()" title="Acessar meu plano">
        <svg width="24" height="24" fill="currentColor" viewBox="0 0 16 16"><path d="M8 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6Zm2-3a2 2 0 1 1-4 0 2 2 0 0 1 4 0Zm4 8c0 1-1 1-1 1H3s-1 0-1-1 1-4 6-4 6 3 6 4Zm-1-.004c-.001-.246-.154-.986-.832-1.664C11.516 10.68 10.289 10 8 10c-2.29 0-3.516.68-4.168 1.332-.678.678-.83 1.418-.832 1.664h10Z"/></svg>
    </div>

    <div id="dieta-section">
        <h2>🍎 Reeducação Alimentar</h2>
        
        <div id="area-busca-rapida" class="secao-especial" style="display: none; border-style: solid; border-color: #FFD700;">
            <h4 style="margin-bottom: 10px;">JÁ POSSUI UM PLANO ATIVO?</h4>
            <div style="display: flex; gap: 10px;">
                <input type="email" id="email-busca" placeholder="E-mail cadastrado" style="margin-top: 0; flex: 1;">
                <button onclick="buscarAcessoRapido()" style="width: auto; background: #FFD700; color: #000; border: none; padding: 0 15px; border-radius: 6px; font-weight: bold; cursor: pointer;">BUSCAR</button>
            </div>
            <div id="resultado-busca" style="display:none; margin-top: 15px; text-align: center; border-top: 1px solid #333; padding-top: 10px;">
                <p style="font-size: 13px; color: #FFD700; margin-bottom: 10px;">Plano encontrado!</p>
                <button id="btn-download-direto">📥 BAIXAR MEU CARDÁPIO PDF</button>
            </div>
        </div>

        <p class="subtitle">Personalize sua alimentação abaixo:</p>
        <div id="status-topo">PROCESSANDO...</div>

        <label>Peso (kg)</label><input type="number" id="peso" placeholder="Ex: 80">
        <label>Calorias Diárias</label><input type="number" id="calorias" placeholder="Ex: 2100">
        <label>Refeições</label>
        <select id="num-refeicoes">
            <option value="4">4 Refeições</option><option value="5">5 Refeições</option><option value="6">6 Refeições</option>
        </select>
        <label>Objetivo</label>
        <select id="objetivo">
            <option value="Emagrecimento">Emagrecimento</option><option value="Hipertrofia">Hipertrofia</option><option value="Definição">Definição</option>
        </select>

        <hr>
        <div id="categorias-container"></div>

        <div class="secao-especial">
            <h4>🍳 MODOS DE PREPARO</h4>
            <div id="preparos-unificados-container" class="grid-alimentos"></div>
        </div>

        <label style="display: flex; align-items: center; font-weight: normal; font-size: 12px; margin-top: 20px;">
            <input type="checkbox" id="aceite-clausula" style="width: 20px; margin-right: 10px;"> Confirmo estar ciente dos termos.
        </label>

        <button id="btn-gerar" onclick="verificarAcessoEPagar()">GERAR E BAIXAR PLANO</button>
        <button id="btn-download-pos-geracao" style="display:none;">📥 BAIXAR MEU PLANO EM PDF</button>
        <div id="resultado"></div>
    </div>
</div>

<script>
    const S_URL = 'https://xyqqngskrjzhxbsackul.supabase.co';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh5cXFuZ3Nrcmp6aHhic2Fja3VsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk5NTI3NzksImV4cCI6MjA4NTUyODc3OX0.B90q1Jv-vodVIV_dLFUCOekyshrv3HekVpPugpPaHRI';
    const _supabase = supabase.createClient(S_URL, S_KEY);

    const estruturaAlimentos = {
        "CARBOIDRATOS": {
            "Arroz": ["Branco", "Integral", "Parboilizado", "Jasmine", "7 Grãos"],
            "Feijão": ["Carioca", "Preto", "Branco", "Fradinho"],
            "Macarrão": ["Comum", "Integral", "De arroz"],
            "Batatas": ["Inglesa Cozida", "Inglesa Assada", "Doce Cozida", "Doce Assada"],
            "Pães": ["Francês", "Integral", "De Forma"],
            "Outros": ["Cuscuz", "Mandioca", "Tapioca", "Aveia"]
        },
        "PROTEÍNAS": {
            "Frango": ["Filé de peito", "Coxa/Sobrecoxa sem pele"],
            "Boi": ["Patinho", "Alcatra", "Músculo"],
            "Ovos": ["Cozidos", "Mexidos", "Omelete"],
            "Peixes": ["Tilápia", "Merluza", "Atum"]
        },
        "GORDURAS & LATICÍNIOS": {
            "Gorduras": ["Azeite", "Abacate", "Castanhas", "Pasta de Amendoim"],
            "Laticínios": ["Iogurte Natural", "Leite Desnatado", "Queijo Minas", "Ricota"]
        },
        "VEGETAIS & FRUTAS": {
            "Legumes": ["Cenoura", "Brócolis", "Abobrinha", "Chuchu", "Vagem"],
            "Frutas": ["Banana", "Maçã", "Mamão", "Abacaxi", "Morango", "Uva"]
        }
    };

    const preparos = ["Cozido", "Grelhado", "Assado", "Airfryer", "Refogado"];

    async function inicializarTudo() {
        renderInterface();
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('pago') === 'true') {
            const rascunho = localStorage.getItem('rascunho_dieta');
            if (rascunho) {
                document.getElementById('status-topo').style.display = 'block';
                document.getElementById('status-topo').innerText = "✅ PAGAMENTO CONFIRMADO! GERANDO...";
                setTimeout(() => gerarDieta(JSON.parse(rascunho)), 1000);
            }
        }
    }

    function renderInterface() {
        const container = document.getElementById('categorias-container');
        for (let cat in estruturaAlimentos) {
            let html = `<div class="categoria-pai">${cat}</div>`;
            for (let sub in estruturaAlimentos[cat]) {
                html += `<details><summary>${sub}</summary><div class="grid-alimentos">`;
                estruturaAlimentos[cat][sub].forEach(item => {
                    html += `<label class="item-alimento"><input type="checkbox" name="alimento" value="${sub}: ${item}"> ${item}</label>`;
                });
                html += `</div></details>`;
            }
            container.innerHTML += html;
        }
        preparos.forEach(p => {
            document.getElementById('preparos-unificados-container').innerHTML += `<label class="item-alimento"><input type="checkbox" name="preparo" value="${p}"> ${p}</label>`;
        });
    }

    async function verificarAcessoEPagar() {
        const email = prompt("Seu e-mail:");
        if (!email) return;
        
        const dados = {
            peso: document.getElementById('peso').value,
            calorias: document.getElementById('calorias').value,
            refeicoes: document.getElementById('num-refeicoes').value,
            objetivo: document.getElementById('objetivo').value,
            alimentos: Array.from(document.querySelectorAll('input[name="alimento"]:checked')).map(i => i.value),
            preparos: Array.from(document.querySelectorAll('input[name="preparo"]:checked')).map(i => i.value),
            email: email.toLowerCase().trim()
        };

        localStorage.setItem('rascunho_dieta', JSON.stringify(dados));
        localStorage.setItem('email_verificacao', dados.email);

        const { data: user } = await _supabase.from('Usuarios_Dieta').select('*').eq('email', dados.email).maybeSingle();

        if (!user || !user.pago || (user.tipo_plano === 'unica' && user.creditos <= 0)) {
            document.getElementById('payment-overlay').style.display = 'flex';
        } else {
            gerarDieta(dados);
        }
    }

    async function iniciarCheckout(priceId) {
        const email = localStorage.getItem('email_verificacao');
        const res = await fetch('/api/checkout', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ priceId, email, tipoPlano: priceId.includes('WyTiPBAu') ? 'unica' : 'anual' })
        });
        const data = await res.json();
        if (data.url) window.location.href = data.url;
    }

    async function gerarDieta(d) {
        const status = document.getElementById('status-topo');
        status.style.display = 'block';
        
        try {
            const res = await fetch('/api/gerar-dieta', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt: `Gerar dieta para ${d.peso}kg`, email: d.email })
            });
            const result = await res.json();
            
            const divRes = document.getElementById('resultado');
            divRes.innerText = result.dieta;
            divRes.style.display = 'block';
            
            const btnPdf = document.getElementById('btn-download-pos-geracao');
            btnPdf.style.display = 'block';
            btnPdf.onclick = () => window.open(result.pdf_url, '_blank');

            // SCROLL AUTOMÁTICO NA GERAÇÃO
            setTimeout(() => { divRes.scrollIntoView({ behavior: 'smooth', block: 'start' }); }, 500);
            
        } catch (e) { alert("Erro ao conectar com o servidor."); }
        finally { status.style.display = 'none'; }
    }

    async function buscarAcessoRapido() {
        const emailInput = document.getElementById('email-busca').value;
        if (!emailInput) return alert("Digite o e-mail.");
        
        try {
            const res = await fetch('/api/buscar-dieta', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: emailInput.toLowerCase().trim() })
            });
            const data = await res.json();

            if (res.ok && data.pdf_url) {
                const areaResult = document.getElementById('resultado-busca');
                areaResult.style.display = 'block';
                document.getElementById('btn-download-direto').onclick = () => window.open(data.pdf_url, '_blank');
                
                // SCROLL AUTOMÁTICO NA BUSCA
                setTimeout(() => { areaResult.scrollIntoView({ behavior: 'smooth', block: 'center' }); }, 300);
            } else {
                alert("Nenhum plano ativo encontrado para este e-mail.");
            }
        } catch (e) { alert("Erro ao conectar com o servidor."); }
    }

    function fecharModal() { document.getElementById('payment-overlay').style.display = 'none'; }
    function alternarBuscaRapida() { 
        const area = document.getElementById('area-busca-rapida');
        area.style.display = area.style.display === 'none' ? 'block' : 'none';
    }
</script>
</body>
</html>
