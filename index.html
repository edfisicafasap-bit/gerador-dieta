<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <title>Reeducação Alimentar</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { background:#000; margin:0; font-family:Arial, sans-serif; color: #fff; padding-bottom: 30px; }
        .container { max-width:600px; margin:auto; padding:20px; background:#000; position: relative; }
        h2 { color:#FFD700; text-align: center; margin-bottom: 5px; font-size: 19px; text-transform: uppercase; }
        p.subtitle { text-align: center; color: #ccc; font-size: 14px; margin-bottom: 25px; }
        label { display:block; margin-top:18px; font-size:14px; font-weight: bold; color: #eee; }
        input, select, textarea { width:100%; padding:12px; margin-top:6px; border-radius:6px; border:1px solid #333; background: #111; color: #fff; font-size: 15px; box-sizing: border-box; }
        
        #btn-gerar { width:100%; margin-top:30px; padding:18px; background:#FFD700; border:none; border-radius:8px; font-size:16px; font-weight:bold; color:#000; cursor: pointer; transition: 0.3s; text-transform: uppercase; }
        #btn-gerar:disabled { background: #555; cursor: not-allowed; }
        
        #btn-download-pos-geracao, #btn-download-direto { 
            width:100%; 
            margin-top:20px; 
            padding:18px; 
            background:#000; 
            border: 2px solid #FFD700; 
            border-radius:8px; 
            font-size:16px; 
            font-weight:bold; 
            color:#FFD700; 
            cursor: pointer; 
            text-transform: uppercase; 
            transition: 0.3s;
        }

        #status-topo { display: none; background: #FFD700; color: #000; padding: 15px; border-radius: 8px; text-align: center; font-weight: bold; margin-bottom: 20px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }

        /* ESTILO DO LOG DE TESTE (DEBUG) */
        #debug-log { 
            display: none; 
            background: #001a00; 
            color: #00ff00; 
            border: 1px solid #00ff00; 
            padding: 15px; 
            margin-top: 20px; 
            font-family: monospace; 
            font-size: 12px; 
            border-radius: 8px; 
            white-space: pre-wrap;
            word-break: break-all;
        }

        #payment-overlay { 
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0,0,0,0.95); 
            z-index: 9999; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            padding: 20px; 
        }

        .payment-card { background: #1e1e1e; padding: 30px; border-radius: 15px; text-align: center; max-width: 350px; border: 1px solid #333; }
        .categoria-pai { color: #FFD700; font-size: 15px; font-weight: bold; margin: 25px 0 10px 0; padding-left: 10px; text-transform: uppercase; border-left: 3px solid #FFD700; }
        details { background: #0a0a0a; border: 1px solid #222; border-radius: 8px; margin-bottom: 6px; overflow: hidden; }
        summary { padding: 12px; cursor: pointer; color: #fff; font-weight: normal; font-size: 13px; text-transform: uppercase; list-style: none; display: flex; justify-content: space-between; align-items: center; }
        .grid-alimentos { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 0 12px 12px 12px; }
        .item-alimento { display: flex; align-items: center; font-size: 12px; color: #bbb; cursor: pointer; padding: 4px 0; }
        .item-alimento input { width: auto; margin: 0 8px 0 0; }
        .secao-especial { background: #111; border: 1px dashed #FFD700; padding: 15px; border-radius: 8px; margin: 20px 0; }
        #resultado { margin-top: 30px; white-space: pre-wrap; background: #111; padding: 20px; border-radius: 8px; display: none; border: 1px solid #FFD700; font-size: 14px; }
        
        .btn-suporte { position: fixed; bottom: 20px; right: 20px; background: #25d366; color: white; padding: 12px 20px; border-radius: 50px; text-decoration: none; font-size: 14px; font-weight: bold; z-index: 1000; display: flex; align-items: center; gap: 8px; }
        .login-shortcut { position: absolute; top: 15px; right: 20px; cursor: pointer; color: #FFD700; background: rgba(255, 215, 0, 0.1); padding: 8px; border-radius: 50%; z-index: 100; }
    </style>
</head>
<body onload="inicializarTudo()">

<a href="https://wa.me/5522992587653" target="_blank" class="btn-suporte">SUPORTE</a>

<div id="payment-overlay">
    <div class="payment-card">
        <h2 style="color: #FFD700;">LIBERAR ACESSO!</h2>
        <button id="btn-unica" style="width: 100%; padding: 12px; margin-bottom: 10px;" onclick="iniciarCheckout('price_1Sz1w7GEaACih56ZWyTiPBAu')">🥗 DIETA ÚNICA - R$ 9,90</button>
        <button id="btn-anual" style="width: 100%; padding: 12px; background: #FFD700; color: #000; font-weight: bold;" onclick="iniciarCheckout('price_1SzPP7GEaACih56ZkwV5mxN2')">📅 ACESSO ANUAL - R$ 29,90</button>
        <p style="margin-top: 20px; font-size: 12px; color: #888; text-decoration: underline; cursor: pointer;" onclick="fecharModal()">Voltar e editar</p>
    </div>
</div>

<div class="container">
    <div class="login-shortcut" onclick="alternarBuscaRapida()">👤</div>

    <div id="dieta-section">
        <h2>🍎 Reeducação Alimentar</h2>
        
        <div id="area-busca-rapida" class="secao-especial" style="display: none;">
            <input type="email" id="email-busca" placeholder="E-mail cadastrado">
            <button onclick="buscarAcessoRapido()">BUSCAR</button>
            <div id="resultado-busca" style="display:none;"><button id="btn-download-direto">📥 BAIXAR PDF</button></div>
        </div>

        <p class="subtitle">Preencha abaixo para gerar seu novo plano:</p>
        <div id="status-topo">ORGANIZANDO SUAS REFEIÇÕES...</div>

        <input type="hidden" id="nome_usuario" value="">
        <label>Seu Peso Atual (kg)</label>
        <input type="number" id="peso" placeholder="Ex: 80">
        <label>Meta de Calorias Diárias</label>
        <input type="number" id="calorias" placeholder="Ex: 2100">
        <label>Número de Refeições</label>
        <select id="num-refeicoes"><option value="4">4 Refeições</option><option value="5">5 Refeições</option><option value="6">6 Refeições</option></select>
        <label>Objetivo</label>
        <select id="objetivo"><option value="Emagrecimento">Emagrecimento</option><option value="Hipertrofia">Hipertrofia</option></select>

        <hr>
        <div id="categorias-container"></div>

        <div class="secao-especial">
            <h4>🍳 MODOS DE PREPARO</h4>
            <div id="preparos-unificados-container" class="grid-alimentos"></div>
        </div>

        <label style="font-size: 12px;"><input type="checkbox" id="aceite-clausula"> Confirmo estar ciente dos termos.</label>

        <button id="btn-gerar" onclick="verificarAcessoEPagar()">GERAR E BAIXAR PLANO</button>
        <button id="btn-download-pos-geracao" style="display:none;">📥 BAIXAR MEU PLANO EM PDF</button>

        <div id="debug-log"></div>

        <div id="resultado"></div>
    </div>
</div>

<script>
    const S_URL = 'https://xyqqngskrjzhxbsackul.supabase.co';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh5cXFuZ3Nrcmp6aHhic2Fja3VsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk5NTI3NzksImV4cCI6MjA4NTUyODc3OX0.B90q1Jv-vodVIV_dLFUCOekyshrv3HekVpPugpPaHRI';
    const _supabase = supabase.createClient(S_URL, S_KEY);

    const estruturaAlimentos = {
        "CARBOIDRATOS": { "Arroz": ["Branco", "Integral"], "Feijão": ["Carioca", "Preto"], "Batata Inglesa": ["Cozida", "Assada"] },
        "PROTEÍNAS": { "Frango": ["Filé de peito"], "Ovos": ["Mexidos", "Cozidos"] }
    };
    const preparosUnificados = ["Cozido", "Assado", "Grelhado"];

    async function inicializarTudo() {
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('pago') !== 'true') localStorage.removeItem('email_verificacao');
        renderInterface();
        recuperarDadosSalvos();
        if (urlParams.get('pago') === 'true') {
            const email = localStorage.getItem('email_verificacao');
            if (email) ativarAcessoNoBanco(email, urlParams.get('tipo'));
        }
    }

    function renderInterface() {
        const container = document.getElementById('categorias-container');
        for (let cat in estruturaAlimentos) {
            let html = `<div class="categoria-pai">${cat}</div>`;
            for (let sub in estruturaAlimentos[cat]) {
                html += `<details><summary>${sub}</summary><div class="grid-alimentos">`;
                estruturaAlimentos[cat][sub].forEach(item => {
                    html += `<label class="item-alimento"><input type="checkbox" name="alimento" value="${sub}: ${item}"> ${item}</label>`;
                });
                html += `</div></details>`;
            }
            container.innerHTML += html;
        }
        preparosUnificados.forEach(p => {
            document.getElementById('preparos-unificados-container').innerHTML += `<label class="item-alimento"><input type="checkbox" name="preparo-geral" value="${p}"> ${p}</label>`;
        });
    }

    function salvarProgressoLocal(emailInput = null) {
        const dados = {
            peso: document.getElementById('peso').value,
            calorias: document.getElementById('calorias').value,
            refeicoes: document.getElementById('num-refeicoes').value,
            objetivo: document.getElementById('objetivo').value,
            nome: document.getElementById('nome_usuario').value,
            alimentos: Array.from(document.querySelectorAll('input[name="alimento"]:checked')).map(i => i.value),
            preparos: Array.from(document.querySelectorAll('input[name="preparo-geral"]:checked')).map(i => i.value)
        };
        localStorage.setItem('rascunho_dieta', JSON.stringify(dados));
        if (emailInput) localStorage.setItem('email_verificacao', emailInput.toLowerCase().trim());
        return dados;
    }

    function recuperarDadosSalvos() {
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('peso')) {
            document.getElementById('peso').value = urlParams.get('peso');
            document.getElementById('calorias').value = urlParams.get('calorias');
            document.getElementById('nome_usuario').value = urlParams.get('nome');
            salvarProgressoLocal();
        } else {
            const salvo = localStorage.getItem('rascunho_dieta');
            if (salvo) {
                const d = JSON.parse(salvo);
                document.getElementById('peso').value = d.peso || '';
                document.getElementById('calorias').value = d.calorias || '';
                d.alimentos?.forEach(v => { const el = document.querySelector(`input[value="${v}"]`); if(el) el.checked = true; });
            }
        }
    }

    async function verificarAcessoEPagar() {
        const d = salvarProgressoLocal();
        if (d.alimentos.length < 2) return alert("Selecione os alimentos!");
        const email = prompt("E-mail:");
        if (!email) return;
        const emailLow = email.toLowerCase().trim();
        localStorage.setItem('email_verificacao', emailLow);
        let { data: user } = await _supabase.from('Usuarios_Dieta').select('*').eq('email', emailLow).maybeSingle();
        if (!user || !user.pago) document.getElementById('payment-overlay').style.display = 'flex';
        else executarGeracaoComConsumo(user.tipo_plano, emailLow);
    }

    async function executarGeracaoComConsumo(tipo, email) {
        const dados = JSON.parse(localStorage.getItem('rascunho_dieta'));
        await _supabase.from('Usuarios_Dieta').update({ ultima_geracao: new Date().toISOString() }).eq('email', email);
        gerarDieta(dados);
    }

    // FUNÇÃO DE GERAÇÃO COM O LOG INTEGRADO
    async function gerarDieta(d) {
        const logBox = document.getElementById('debug-log');
        const statusTopo = document.getElementById('status-topo');
        
        // MOSTRAR O LOG NA TELA ANTES DE ENVIAR
        logBox.style.display = 'block';
        logBox.innerText = `[LOG DE TESTE]\nEnviando para IA:\nPeso: ${d.peso}\nCalorias: ${d.calorias}\nAlimentos: ${d.alimentos.join(', ')}\nObjetivo: ${d.objetivo}`;

        statusTopo.style.display = 'block';
        try {
            const response = await fetch('/api/gerar-dieta', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    prompt: `Gere dieta para ${d.peso}kg, ${d.calorias}kcal, alimentos: ${d.alimentos.join(',')}`, 
                    email: localStorage.getItem('email_verificacao') 
                })
            });
            const result = await response.json();
            document.getElementById('resultado').innerText = result.dieta;
            document.getElementById('resultado').style.display = 'block';
            document.getElementById('btn-download-pos-geracao').style.display = 'block';
            document.getElementById('btn-download-pos-geracao').onclick = () => baixarPDF(result.dieta);
        } catch (e) {
            alert("Erro na geração");
        } finally {
            statusTopo.style.display = 'none';
        }
    }

    function baixarPDF(txt) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.text(doc.splitTextToSize(txt, 180), 10, 10);
        doc.save("dieta.pdf");
    }

    function iniciarCheckout(id) {
        salvarProgressoLocal();
        const email = localStorage.getItem('email_verificacao');
        window.location.href = `https://buy.stripe.com/test_exemplo?prefilled_email=${email}`;
    }

    function fecharModal() { document.getElementById('payment-overlay').style.display = 'none'; }
    function alternarBuscaRapida() { const a = document.getElementById('area-busca-rapida'); a.style.display = a.style.display === 'none' ? 'block' : 'none'; }
</script>
</body>
</html>
