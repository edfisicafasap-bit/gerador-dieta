        },

        "GORDURAS": { "Gorduras Boas": ["Abacate", "Azeite de oliva extra virgem", "Castanha-do-pará", "Castanha de caju", "Amêndoas", "Nozes", "Amendoim", "Pasta de amendoim"] },
        "LEGUMES": { "Legumes": ["Cenoura", "Brócolis", "Couve-flor", "Abobrinha", "Abóbora", "Berinjela", "Espinafre", "Chuchu", "Quiabo", "Vagem", "Pepino", "Beterraba"] },

    };

    const preparosUnificados = ["Cozido", "Assado", "Grelhado", "Refogado", "Na Airfryer", "Na frigideira", "Moído", "Desfiado", "Cozido no vapor", "Ensopado"];

    const frasesCarregamento = ["🚀 ORGANIZANDO SUAS REFEIÇÕES...", "🍳 SELECIONANDO PREPAROS...", "📋 FINALIZANDO PLANO...", "✨ QUASE PRONTO..."];

    async function inicializarTudo() {
        const urlParams = new URLSearchParams(window.location.search);
        const pago = urlParams.get('pago');
        if (pago !== 'true') localStorage.removeItem('email_verificacao');

        renderInterface();
        recuperarDadosSalvos();
        
        const tipoPlano = urlParams.get('tipo');
        const emailSalvo = localStorage.getItem('email_verificacao');

        if (pago === 'true' && emailSalvo && tipoPlano) {
            const statusTopo = document.getElementById('status-topo');
            statusTopo.style.display = 'block';
            statusTopo.innerText = "✅ PAGAMENTO CONFIRMADO! 🚀";
            setTimeout(async () => await ativarAcessoNoBanco(emailSalvo, tipoPlano), 4000); 
        }
    }

    function renderInterface() {
        const container = document.getElementById('categorias-container');
        container.innerHTML = '';
        for (let cat in estruturaAlimentos) {
            let html = `<div class="categoria-pai">${cat}</div>`;
            for (let sub in estruturaAlimentos[cat]) {
                html += `<details><summary>${sub}</summary><div class="grid-alimentos">`;
                estruturaAlimentos[cat][sub].forEach(item => {
                    html += `<label class="item-alimento"><input type="checkbox" name="alimento" value="${sub}: ${item}"> ${item}</label>`;
                });
                html += `</div></details>`;
            }
            container.innerHTML += html;
        }
        const prepCont = document.getElementById('preparos-unificados-container');
        prepCont.innerHTML = '';
        preparosUnificados.forEach(p => {
            prepCont.innerHTML += `<label class="item-alimento"><input type="checkbox" name="preparo-geral" value="${p}"> ${p}</label>`;
        });
    }

    function salvarProgressoLocal(emailInput = null) {
        const dados = {
            peso: document.getElementById('peso').value,
            calorias: document.getElementById('calorias').value,
            refeicoes: document.getElementById('num-refeicoes').value,
            objetivo: document.getElementById('objetivo').value,
            nome: document.getElementById('nome_usuario').value,
            alimentos: Array.from(document.querySelectorAll('input[name="alimento"]:checked')).map(i => i.value),
            preparos: Array.from(document.querySelectorAll('input[name="preparo-geral"]:checked')).map(i => i.value)
        };
        localStorage.setItem('rascunho_dieta', JSON.stringify(dados));
        if (emailInput) localStorage.setItem('email_verificacao', emailInput.toLowerCase().trim());
    }

    function recuperarDadosSalvos() {
        const salvo = localStorage.getItem('rascunho_dieta');
        if (!salvo) return;
        const d = JSON.parse(salvo);
        document.getElementById('peso').value = d.peso || '';
        document.getElementById('calorias').value = d.calorias || '';
        document.getElementById('num-refeicoes').value = d.refeicoes || '4';
        document.getElementById('objetivo').value = d.objetivo || 'Emagrecimento';
        d.alimentos?.forEach(val => {
            const el = document.querySelector(`input[name="alimento"][value="${val}"]`);
            if (el) el.checked = true;
        });
        d.preparos?.forEach(val => {
            const el = document.querySelector(`input[name="preparo-geral"][value="${val}"]`);
            if (el) el.checked = true;
        });
    }

    async function verificarAcessoEPagar() {
        if (Array.from(document.querySelectorAll('input[name="alimento"]:checked')).length < 5) return alert("Selecione pelo menos 5 alimentos!");
        if (!document.getElementById('aceite-clausula').checked) return alert("Aceite os termos!");
        
        const emailAcesso = prompt("Informe seu e-mail:");
        if (!emailAcesso) return;
        const emailLow = emailAcesso.toLowerCase().trim();
        salvarProgressoLocal(emailLow);

        let { data: user } = await _supabase.from('Usuarios_Dieta').select('*').eq('email', emailLow).maybeSingle();

        if (!user || !user.pago) {
            document.getElementById('payment-overlay').style.display = 'flex';
            return;
        }

        if (user.tipo_plano === 'unica' && user.creditos <= 0) {
            alert("Limite do Plano Único atingido.");
            document.getElementById('payment-overlay').style.display = 'flex';
            return;
        }
        executarGeracaoComConsumo(user.tipo_plano, emailLow, user.contagem_semanal || 0);
    }

    async function executarGeracaoComConsumo(tipo, email, contagemAtual = 0) {
        if (tipo === 'unica') await _supabase.from('Usuarios_Dieta').update({ creditos: 0, ultima_geracao: new Date().toISOString() }).eq('email', email);
        else await _supabase.from('Usuarios_Dieta').update({ contagem_semanal: contagemAtual + 1, ultima_geracao: new Date().toISOString() }).eq('email', email);
        await gerarDieta(JSON.parse(localStorage.getItem('rascunho_dieta'))); 
    }

    async function gerarDieta(d) {
        const btn = document.getElementById('btn-gerar');
        const statusTopo = document.getElementById('status-topo');
        const pesoUser = parseFloat(d.peso);

        statusTopo.style.display = 'block';
        btn.disabled = true;

        // LÓGICA DE MACROS E PROMPT DO ARQUIVO 1
        let metaProt, metaGord;
        if (d.objetivo === 'Emagrecimento') { metaProt = 2.2; metaGord = 0.8; }
        else if (d.objetivo === 'Hipertrofia') { metaProt = 1.8; metaGord = 1.0; }
        else { metaProt = 2.0; metaGord = 0.9; }

        const gorduraAlvoG = (pesoUser * metaGord).toFixed(1);
        const proteinaAlvoG = (pesoUser * metaProt).toFixed(0);

        const promptFinal = `Atue como um Nutricionista Prático. Seu objetivo é converter listas de alimentos e macros em um cardápio culinário real... Peso: ${pesoUser}kg, Gordura Alvo: ${gorduraAlvoG}g, Proteína Alvo: ${proteinaAlvoG}g.`;

        try {
            const response = await fetch('/api/gerar-dieta', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt: promptFinal, email: localStorage.getItem('email_verificacao') })
            });
            const result = await response.json();
            if (!response.ok) throw new Error(result.error);

            document.getElementById('resultado').innerText = result.dieta;
            document.getElementById('resultado').style.display = 'block';
            document.getElementById('btn-download-pos-geracao').style.display = 'block';
            document.getElementById('btn-download-pos-geracao').onclick = () => window.open(result.pdf_url, '_blank');
            
            limparDadosEApp();
        } catch (e) { alert("Erro: " + e.message); }
        finally { btn.disabled = false; statusTopo.style.display = 'none'; }
    }

    async function ativarAcessoNoBanco(email, tipo) {
        const proximoReset = new Date();
        proximoReset.setDate(proximoReset.getDate() + 7);
        const updates = { pago: true, tipo_plano: tipo, creditos: (tipo === 'unica' ? 1 : 0), contagem_semanal: 0, data_reset: proximoReset.toISOString(), ultima_geracao: new Date().toISOString() };
        await _supabase.from('Usuarios_Dieta').update(updates).eq('email', email.toLowerCase().trim());
        setTimeout(() => {
            window.history.replaceState({}, document.title, window.location.pathname);
            executarGeracaoComConsumo(tipo, email.toLowerCase().trim(), 0);
        }, 1000);
    }

    function iniciarCheckout(priceId) {
        const email = localStorage.getItem('email_verificacao') || "";
        const LINK_UNICA = `https://buy.stripe.com/test_bJe7sLcqhcL0g0B9T9asg00?prefilled_email=${encodeURIComponent(email)}`;
        const LINK_ANUAL = `https://buy.stripe.com/test_3cI8wP0Hz9yO4hTc1hasg01?prefilled_email=${encodeURIComponent(email)}`; 
        window.location.href = (priceId === 'price_1Sz1w7GEaACih56ZWyTiPBAu') ? LINK_UNICA : LINK_ANUAL;
    }

    function limparDadosEApp() {
        localStorage.removeItem('rascunho_dieta');
        localStorage.removeItem('email_verificacao'); 
        document.querySelectorAll('input[type="checkbox"]').forEach(c => c.checked = false);
        document.querySelectorAll('input[type="number"], input[type="email"]').forEach(i => i.value = '');
    }

    function fecharModal() { document.getElementById('payment-overlay').style.display = 'none'; }
    function alternarBuscaRapida() { 
        const area = document.getElementById('area-busca-rapida');
        area.style.display = area.style.display === 'none' ? 'block' : 'none';
    }

    async function buscarAcessoRapido() {
        const email = document.getElementById('email-busca').value.toLowerCase().trim();
        const { data: user } = await _supabase.from('Usuarios_Dieta').select('*').eq('email', email).maybeSingle();
        if (user && user.pdf_url) {
            document.getElementById('resultado-busca').style.display = 'block';
            document.getElementById('btn-download-direto').onclick = () => window.open(user.pdf_url, '_blank');
        } else alert("Plano não encontrado.");
    }
</script>
