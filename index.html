<script>
    const S_URL = 'https://xyqqngskrjzhxbsackul.supabase.co';

    const _supabase = supabase.createClient(S_URL, S_KEY);

    const estruturaAlimentos = {
        "CARBOIDRATOS": {
            "Arroz": ["Branco", "Integral", "Parboilizado", "Jasmine", "Basmati", "7 Grãos"],

            "Batata Doce": ["Cozida", "Assada", "Purê", "Sauté", "Rústica forno/airfryer", "Frita na airfryer"],

        },
        "PEIXES": { "Peixes": ["Filé de tilápia", "Filé de merluza", "Filé de linguado", "Filé de atum fresco"] },
        "GORDURAS": { "Gorduras Boas": ["Abacate", "Azeite de oliva extra virgem", "Castanha-do-pará", "Castanha de caju", "Amêndoas", "Nozes", "Amendoim", "Pasta de amendoim"] },
        "LEGUMES": { "Legumes": ["Cenoura", "Brócolis", "Couve-flor", "Abobrinha", "Abóbora", "Berinjela", "Espinafre", "Chuchu", "Quiabo", "Vagem", "Pepino", "Beterraba", "Pimentão", "Couve"] },
        "FRUTAS": { "Frutas": ["Banana", "Maçã", "Mamão", "Laranja", "Abacaxi", "Melancia", "Melão", "Manga", "Morango", "Uva", "Goiaba", "Pêra", "Kiwi", "Caju", "Limão", "Acerola", "Tangerina"] },

        "OUTROS": { "Outros": ["Peito de peru", "Iogurte Natural", "Leite Integral", "Leite Desnatado", "Leite s/Lactose", "Leite De Amendoas", "Leite de soja", "Ricota", "Queijo Minas", "Queijo Muçarela", "Whey Protein", "Mel"] }
    };

    const preparosUnificados = ["Cozido", "Assado", "Grelhado", "Refogado", "Na Airfryer", "Na frigideira", "Moído", "Desfiado", "Cozido no vapor", "Ensopado"];

    async function inicializarTudo() {
        renderInterface();
        const urlParams = new URLSearchParams(window.location.search);
        const pago = urlParams.get('pago');
        const emailSalvo = localStorage.getItem('email_verificacao');
        const rascunho = localStorage.getItem('rascunho_dieta');

        if (pago === 'true' && emailSalvo && rascunho) {
            const status = document.getElementById('status-topo');
            status.style.display = 'block';
            status.innerText = "✅ PAGAMENTO CONFIRMADO! GERANDO SEU PLANO...";
            setTimeout(() => gerarDieta(JSON.parse(rascunho)), 1500);
        } else {
            limparDadosEApp();
        }
    }

    function renderInterface() {
        const container = document.getElementById('categorias-container');
        container.innerHTML = '';
        for (let cat in estruturaAlimentos) {
            let html = `<div class="categoria-pai">${cat}</div>`;
            for (let sub in estruturaAlimentos[cat]) {
                html += `<details><summary>${sub}</summary><div class="grid-alimentos">`;
                estruturaAlimentos[cat][sub].forEach(item => {
                    html += `<label class="item-alimento"><input type="checkbox" name="alimento" value="${sub}: ${item}"> ${item}</label>`;
                });
                html += `</div></details>`;
            }
            container.innerHTML += html;
        }
        const prepCont = document.getElementById('preparos-unificados-container');
        prepCont.innerHTML = '';
        preparosUnificados.forEach(p => {
            prepCont.innerHTML += `<label class="item-alimento"><input type="checkbox" name="preparo-geral" value="${p}"> ${p}</label>`;
        });
    }

    function salvarProgressoLocal(email) {
        const dados = {
            peso: document.getElementById('peso').value,
            calorias: document.getElementById('calorias').value,
            refeicoes: document.getElementById('num-refeicoes').value,
            objetivo: document.getElementById('objetivo').value,
            alimentos: Array.from(document.querySelectorAll('input[name="alimento"]:checked')).map(i => i.value),
            preparos: Array.from(document.querySelectorAll('input[name="preparo-geral"]:checked')).map(i => i.value),
            email: email.toLowerCase().trim()
        };
        localStorage.setItem('rascunho_dieta', JSON.stringify(dados));
        localStorage.setItem('email_verificacao', dados.email);
    }

    async function verificarAcessoEPagar() {
        if (Array.from(document.querySelectorAll('input[name="alimento"]:checked')).length < 5) return alert("Selecione pelo menos 5 alimentos!");
        if (!document.getElementById('aceite-clausula').checked) return alert("Aceite os termos!");
        
        const email = prompt("Informe seu e-mail para salvar o plano:");
        if (!email) return;
        salvarProgressoLocal(email);

        const { data: user } = await _supabase.from('Usuarios_Dieta').select('*').eq('email', email.toLowerCase().trim()).maybeSingle();

        if (!user || !user.pago || (user.tipo_plano === 'unica' && user.creditos <= 0)) {
            document.getElementById('payment-overlay').style.display = 'flex';
        } else {
            await gerarDieta(JSON.parse(localStorage.getItem('rascunho_dieta')));
        }
    }

    async function iniciarCheckout(priceId) {
        const email = localStorage.getItem('email_verificacao');
        
        if (!email) {
            alert("E-mail não encontrado. Por favor, informe seu e-mail novamente.");
            return;
        }

        // Determina o tipo do plano para a API
        const tipoPlano = priceId.includes('5mxN2') ? 'anual' : 'unica';

        try {
            console.log("Iniciando checkout...", { priceId, email, tipoPlano });

            const response = await fetch('/api/checkout', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    priceId: priceId, 
                    email: email.toLowerCase().trim(), 
                    tipoPlano: tipoPlano 
                })
            });

            const session = await response.json();

            if (session.url) {
                // Se tudo deu certo, redireciona para o Stripe
                window.location.href = session.url;
            } else {
                // Se a API retornou um erro (ex: ID de preço errado)
                console.error("Erro da API:", session.error);
                alert("Erro ao abrir pagamento: " + (session.error || "Tente novamente."));
            }
        } catch (err) {
            // Se o servidor estiver fora do ar ou houver erro de rede
            console.error("Erro de conexão:", err);
            alert("Erro de conexão. Verifique sua internet ou os logs da Vercel.");
        }
    }

    async function gerarDieta(d) {
        const divRes = document.getElementById('resultado');
        const status = document.getElementById('status-topo');
        const btnDownloadPos = document.getElementById('btn-download-pos-geracao');
        const btnGerar = document.getElementById('btn-gerar');

        status.style.display = 'block';
        btnGerar.disabled = true;

        const metaProt = d.objetivo === 'Emagrecimento' ? 2.2 : (d.objetivo === 'Hipertrofia' ? 1.8 : 2.0);
        const metaGord = d.objetivo === 'Emagrecimento' ? 0.8 : (d.objetivo === 'Hipertrofia' ? 1.0 : 0.9);
        const gorduraAlvoG = (parseFloat(d.peso) * metaGord).toFixed(1);
        const proteinaAlvoG = (parseFloat(d.peso) * metaProt).toFixed(0);

        const promptFinal = `Atue como um Nutricionista. Gere um cardápio de Reeducação Alimentar: Peso: ${d.peso}kg, Calorias: ${d.calorias}, Refeições: ${d.refeicoes}, Objetivo: ${d.objetivo}. Alimentos: ${d.alimentos.join(', ')}. Preparos: ${d.preparos.join(', ')}. Macros Alvo: Prot ${proteinaAlvoG}g, Gord ${gorduraAlvoG}g.`;

        try {
            const response = await fetch('/api/gerar-dieta', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt: promptFinal, email: d.email })
            });

            const result = await response.json();
            if (!response.ok) throw new Error(result.error);

            divRes.innerText = result.dieta;
            divRes.style.display = 'block';
            btnDownloadPos.style.display = 'block';
            btnDownloadPos.onclick = () => window.open(result.pdf_url, '_blank');

            // SCROLL AUTOMÁTICO CORRIGIDO
            setTimeout(() => {
                divRes.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }, 500);

            limparDadosEApp();
        } catch (e) { alert("Erro: " + e.message); }
        finally {
            status.style.display = 'none';
            btnGerar.disabled = false;
        }
    }

    async function buscarAcessoRapido() {
        const email = document.getElementById('email-busca').value;
        if (!email) return alert("Digite seu e-mail.");
        
        try {
            const response = await fetch('/api/buscar-dieta', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email.toLowerCase().trim() })
            });
            const data = await response.json();

            if (response.ok && data.pdf_url) {
                const resBusca = document.getElementById('resultado-busca');
                resBusca.style.display = 'block';
                document.getElementById('btn-download-direto').onclick = () => window.open(data.pdf_url, '_blank');
                
                // SCROLL AUTOMÁTICO NA BUSCA
                setTimeout(() => {
                    resBusca.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }, 300);
            } else {
                alert(data.error || "Nenhum plano ativo encontrado.");
            }
        } catch (err) { alert("Erro ao conectar com o servidor."); }
    }

    function limparDadosEApp() {
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('pago') === 'true') return;

        localStorage.removeItem('rascunho_dieta');
        localStorage.removeItem('email_verificacao');
        document.querySelectorAll('input:not([type="button"]), select').forEach(i => {
            if (i.type === 'checkbox') i.checked = false;
            else i.value = '';
        });
    }

    function fecharModal() { document.getElementById('payment-overlay').style.display = 'none'; }
    function alternarBuscaRapida() { 
        const area = document.getElementById('area-busca-rapida');
        area.style.display = area.style.display === 'none' ? 'block' : 'none';
    }
</script>
