        #btn-download-pos-geracao:hover, #btn-download-direto:hover { background: #FFD700; color: #000; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }

        #payment-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        .payment-card { background: #1e1e1e; padding: 30px; border-radius: 15px; text-align: center; max-width: 350px; border: 1px solid #333; font-family: sans-serif; }

        .categoria-pai { color: #FFD700; font-size: 15px; font-weight: bold; margin: 25px 0 10px 0; padding-left: 10px; text-transform: uppercase; border-left: 3px solid #FFD700; }
        details { background: #0a0a0a; border: 1px solid #222; border-radius: 8px; margin-bottom: 6px; overflow: hidden; }
        summary { padding: 12px; cursor: pointer; color: #fff; font-weight: normal; font-size: 13px; text-transform: uppercase; list-style: none; display: flex; justify-content: space-between; align-items: center; }
        summary::after { content: '▼'; font-size: 10px; color: #FFD700; transition: 0.3s; }
        details[open] summary::after { transform: rotate(180deg); }
        .grid-alimentos { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 0 12px 12px 12px; }
        .item-alimento { display: flex; align-items: center; font-size: 12px; color: #bbb; cursor: pointer; padding: 4px 0; }
        .item-alimento input { width: auto; margin: 0 8px 0 0; }
        .secao-especial { background: #111; border: 1px dashed #FFD700; padding: 15px; border-radius: 8px; margin: 20px 0; }
        .secao-especial h4 { margin-top: 0; color: #FFD700; font-size: 14px; }
        #resultado { margin-top: 30px; white-space: pre-wrap; background: #111; padding: 20px; border-radius: 8px; display: none; border: 1px solid #FFD700; font-size: 14px; line-height: 1.6; }
        hr { border: 0.5px solid #222; margin: 30px 0; }

        .btn-suporte { position: fixed; bottom: 20px; right: 20px; background: #25d366; color: white; padding: 12px 20px; border-radius: 50px; text-decoration: none; font-size: 14px; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.5); z-index: 1000; display: flex; align-items: center; gap: 8px; }
        .login-shortcut { position: absolute; top: 15px; right: 20px; cursor: pointer; color: #FFD700; background: rgba(255, 215, 0, 0.1); padding: 8px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: 0.3s; border: 1px solid transparent; z-index: 100; }

</head>

        <button id="btn-gerar" onclick="verificarAcessoEPagar()">GERAR E BAIXAR PLANO</button>

</div>

<script>
    const S_URL = 'https://xyqqngskrjzhxbsackul.supabase.co';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh5cXFuZ3Nrcmp6aHhic2Fja3VsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk5NTI3NzksImV4cCI6MjA4NTUyODc3OX0.B90q1Jv-vodVIV_dLFUCOekyshrv3HekVpPugpPaHRI';
    const _supabase = supabase.createClient(S_URL, S_KEY);

    const estruturaAlimentos = {
        "CARBOIDRATOS": {
            "Arroz": ["Branco", "Integral", "Parboilizado", "Jasmine", "Basmati", "7 Grãos"],
            "Feijão": ["Carioca", "Preto", "Branco", "Fradinho", "Vermelho"],
            "Macarrão": ["Comum (Sêmola)", "Integral", "De arroz", "Sem glúten"],
            "Cuscuz": ["De milho", "Nordestino", "Marroquino", "Integral"],
            "Batatas": ["Batata Inglesa", "Batata Doce", "Mandioca", "Mandioquinha", "Inhame"],
            "Pão": ["Francês", "Forma branco", "Forma integral", "Integral com grãos", "Sírio", "De aveia"],
            "Outros": ["Tapioca", "Aveia", "Flocão de Milho"]
        },
        "PROTEÍNAS": {
            "Frango": ["Filé de peito", "Coxa e sobrecoxa (sem pele)"],
            "Boi": ["Patinho", "Coxão mole", "Coxão duro", "Lagarto", "Músculo", "Alcatra limpa"],
            "Porco": ["Lombo suíno", "Filé mignon suíno"],
            "Ovos": ["Mexidos", "Cozidos", "Omelete", "Pochê", "Frito na água"]
        },
        "PEIXES": { "Peixes": ["Filé de tilápia", "Filé de merluza", "Filé de linguado", "Filé de atum fresco"] },
        "GORDURAS": { "Gorduras Boas": ["Abacate", "Azeite de oliva extra virgem", "Castanhas", "Amendoim", "Pasta de amendoim integral"] },
        "LEGUMES": { "Legumes": ["Cenoura", "Brócolis", "Couve-flor", "Abobrinha", "Abóbora", "Berinjela", "Chuchu", "Vagem", "Beterraba"] },
        "FRUTAS": { "Frutas": ["Banana", "Maçã", "Mamão", "Laranja", "Abacaxi", "Melancia", "Manga", "Morango", "Uva", "Kiwi"] },
        "SEMENTES": { "Sementes": ["Chia", "Linhaça", "Semente de abóbora", "Semente de girassol", "Gergelim", "Quinoa"] }
    };

    const preparosUnificados = ["Cozido", "Assado", "Grelhado", "Refogado", "Na Airfryer", "Na frigideira", "Cozido no vapor"];

    async function inicializarTudo() {
        renderInterface();
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('pago') === 'true') {
            const emailSalvo = localStorage.getItem('email_verificacao');
            const tipoPlano = urlParams.get('tipo');
            if (emailSalvo) await ativarAcessoNoBanco(emailSalvo, tipoPlano);
        }
    }

    function renderInterface() {
        const container = document.getElementById('categorias-container');
        for (let cat in estruturaAlimentos) {
            let html = `<div class="categoria-pai">${cat}</div>`;
            for (let sub in estruturaAlimentos[cat]) {
                html += `<details><summary>${sub}</summary><div class="grid-alimentos">`;
                estruturaAlimentos[cat][sub].forEach(item => {
                    html += `<label class="item-alimento"><input type="checkbox" name="alimento" value="${sub}: ${item}"> ${item}</label>`;
                });
                html += `</div></details>`;
            }
            container.innerHTML += html;
        }
        const prepCont = document.getElementById('preparos-unificados-container');
        preparosUnificados.forEach(p => {
            prepCont.innerHTML += `<label class="item-alimento"><input type="checkbox" name="preparo-geral" value="${p}"> ${p}</label>`;
        });
    }

    async function verificarAcessoEPagar() {
        const email = prompt("Informe seu e-mail para salvar seu plano:");
        if (!email) return;
        localStorage.setItem('email_verificacao', email.toLowerCase().trim());
        
        const { data: user } = await _supabase.from('Usuarios_Dieta').select('*').eq('email', email.toLowerCase().trim()).maybeSingle();
        if (!user || !user.pago) {
            document.getElementById('payment-overlay').style.display = 'flex';
        } else {
            gerarDieta();
        }
    }

    async function gerarDieta() {
        const btn = document.getElementById('btn-gerar');
        const statusTopo = document.getElementById('status-topo');
        const pesoUser = parseFloat(document.getElementById('peso').value);
        const objetivo = document.getElementById('objetivo').value;

        // LÓGICA DE MACROS RESTAURADA DO SEU ARQUIVO
        let metaProt, metaGord;
        if (objetivo === 'Emagrecimento') { metaProt = 2.2; metaGord = 0.8; }
        else if (objetivo === 'Hipertrofia') { metaProt = 1.8; metaGord = 1.0; }
        else { metaProt = 2.0; metaGord = 0.9; }

        const gorduraAlvoG = (pesoUser * metaGord).toFixed(1);
        const proteinaAlvoG = (pesoUser * metaProt).toFixed(0);

        statusTopo.style.display = 'block';
        btn.disabled = true;

        const promptFinal = `Atue como um Nutricionista. Peso: ${pesoUser}kg, Gordura: ${gorduraAlvoG}g, Proteína: ${proteinaAlvoG}g. Objetivo: ${objetivo}.`;

        try {
            const response = await fetch('/api/gerar-dieta', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt: promptFinal, email: localStorage.getItem('email_verificacao') })
            });
            const result = await response.json();
            document.getElementById('resultado').innerText = result.dieta;
            document.getElementById('resultado').style.display = 'block';
            document.getElementById('btn-download-pos-geracao').style.display = 'block';
            document.getElementById('btn-download-pos-geracao').onclick = () => window.open(result.pdf_url, '_blank');
        } catch (e) {
            alert("Erro na geração.");
        } finally {
            btn.disabled = false;
            statusTopo.style.display = 'none';
        }
    }

    function iniciarCheckout(priceId) {
        const email = localStorage.getItem('email_verificacao');
        window.location.href = `https://buy.stripe.com/test_...&prefilled_email=${encodeURIComponent(email)}`;
    }
</script>
</body>
