    };

    const frasesCarregamento = ["🚀 ORGANIZANDO SUAS REFEIÇÕES...", "🍳 SELECIONANDO PREPAROS...", "📋 FINALIZANDO PLANO...", "✨ QUASE PRONTO..."];

    async function inicializarTudo() {
        const urlParams = new URLSearchParams(window.location.search);
        const pago = urlParams.get('pago');
        const pesoURL = urlParams.get('peso');

        renderInterface();

        if (pago === 'true' || pesoURL) {
            recuperarDadosSalvos();
            if (pesoURL) document.getElementById('peso').value = pesoURL;
            if (urlParams.get('calorias')) document.getElementById('calorias').value = urlParams.get('calorias');
            if (urlParams.get('objetivo')) document.getElementById('objetivo').value = urlParams.get('objetivo');
            salvarProgressoLocal();
        } else {
            limparCamposVisualmente();
        }

        if (pago === 'true') {
            const emailSalvo = localStorage.getItem('email_verificacao');
            if (emailSalvo) ativarAcessoNoBanco(emailSalvo, urlParams.get('tipo'));
        }
    }

    function renderInterface() {
        const container = document.getElementById('categorias-container');
        container.innerHTML = '';
        for (let cat in estruturaAlimentos) {
            let html = `<div class="categoria-pai">${cat}</div>`;
            for (let sub in estruturaAlimentos[cat]) {
                html += `<details><summary>${sub}</summary><div class="grid-alimentos">`;
                estruturaAlimentos[cat][sub].forEach(item => {
                    html += `<label class="item-alimento"><input type="checkbox" name="alimento" value="${sub}: ${item}"> ${item}</label>`;
                });
                html += `</div></details>`;
            }
            container.innerHTML += html;
        }
        const prepCont = document.getElementById('preparos-unificados-container');
        prepCont.innerHTML = '';
        preparosUnificados.forEach(p => {
            prepCont.innerHTML += `<label class="item-alimento"><input type="checkbox" name="preparo-geral" value="${p}"> ${p}</label>`;
        });
    }

    function limparCamposVisualmente() {
        document.getElementById('peso').value = '';
        document.getElementById('calorias').value = '';
        document.getElementById('num-refeicoes').value = '4';
        document.getElementById('aceite-clausula').checked = false;
        // CORREÇÃO 1: Limpa todos os checkboxes de alimentos e preparos
        document.querySelectorAll('input[type="checkbox"]').forEach(c => c.checked = false);
    }

    function salvarProgressoLocal(emailInput = null) {
        const dados = {
            peso: document.getElementById('peso').value,
            calorias: document.getElementById('calorias').value,
            refeicoes: document.getElementById('num-refeicoes').value,
            objetivo: document.getElementById('objetivo').value,
            nome: document.getElementById('nome_usuario').value,
            alimentos: Array.from(document.querySelectorAll('input[name="alimento"]:checked')).map(i => i.value),
            preparos: Array.from(document.querySelectorAll('input[name="preparo-geral"]:checked')).map(i => i.value)
        };
        localStorage.setItem('rascunho_dieta', JSON.stringify(dados));
        if (emailInput) localStorage.setItem('email_verificacao', emailInput.toLowerCase().trim());
    }

    function recuperarDadosSalvos() {
        const salvo = localStorage.getItem('rascunho_dieta');
        if (!salvo) return;
        const d = JSON.parse(salvo);
        document.getElementById('peso').value = d.peso || '';
        document.getElementById('calorias').value = d.calorias || '';
        document.getElementById('num-refeicoes').value = d.refeicoes || '4';
        document.getElementById('objetivo').value = d.objetivo || 'Emagrecimento';
        d.alimentos?.forEach(val => {
            const el = document.querySelector(`input[name="alimento"][value="${val}"]`);
            if (el) el.checked = true;
        });
        d.preparos?.forEach(val => {
            const el = document.querySelector(`input[name="preparo-geral"][value="${val}"]`);
            if (el) el.checked = true;
        });
    }

    async function verificarAcessoEPagar() {
        // CORREÇÃO 2: Força o salvamento dos dados da tela no rascunho ANTES de prosseguir
        salvarProgressoLocal();

        const alimentos = Array.from(document.querySelectorAll('input[name="alimento"]:checked'));
        if (alimentos.length < 5) return alert("Selecione pelo menos 5 alimentos!");
        if (!document.getElementById('aceite-clausula').checked) return alert("Aceite os termos!");
        
        const emailAcesso = prompt("Informe seu e-mail:");
        if (!emailAcesso) return;
        const emailLow = emailAcesso.toLowerCase().trim();
        localStorage.setItem('email_verificacao', emailLow);

        let { data: user } = await _supabase.from('Usuarios_Dieta').select('*').eq('email', emailLow).single();

        if (!user || !user.pago) {
            document.getElementById('payment-overlay').style.display = 'flex';
            return;
        }

        if (user.tipo_plano === 'unica') {
            if (user.creditos <= 0) {
                alert("Créditos esgotados!");
                document.getElementById('payment-overlay').style.display = 'flex';
                return;
            }
            executarGeracaoComConsumo('unica', emailLow);
        } else {
            executarGeracaoComConsumo('anual', emailLow, user.contagem_semanal || 0);
        }
    }

    async function executarGeracaoComConsumo(tipo, email, contagemAtual = 0) {
        // Pega o rascunho MAIS RECENTE que acabamos de salvar na função anterior
        const dadosLocais = localStorage.getItem('rascunho_dieta');
        if (!dadosLocais) return alert("Erro ao recuperar dados.");
        
        if (tipo === 'unica') await _supabase.from('Usuarios_Dieta').update({ creditos: 0, ultima_geracao: new Date().toISOString() }).eq('email', email);
        else await _supabase.from('Usuarios_Dieta').update({ contagem_semanal: contagemAtual + 1, ultima_geracao: new Date().toISOString() }).eq('email', email);
        
        await gerarDieta(JSON.parse(dadosLocais)); 
    }

    async function gerarDieta(d) {
        const btn = document.getElementById('btn-gerar');
        const statusTopo = document.getElementById('status-topo');
        const divResultado = document.getElementById('resultado');

        statusTopo.style.display = 'block';
        btn.innerText = "AGUARDE...";
        btn.disabled = true;

        const gorduraAlvoG = (parseFloat(d.peso) * (d.objetivo === 'Emagrecimento' ? 0.8 : 1.0)).toFixed(1);
        const proteinaAlvoG = (parseFloat(d.peso) * (d.objetivo === 'Emagrecimento' ? 2.2 : 1.8)).toFixed(0);

        const promptFinal = `Nutricionista Prático: Gere plano de ${d.calorias}kcal para ${d.objetivo}, peso ${d.peso}kg, ${d.refeicoes} refeições. Alimentos: ${d.alimentos.join(', ')}. Preparos: ${d.preparos.join(', ')}. Gorduras: ${gorduraAlvoG}g, Proteínas: ${proteinaAlvoG}g.`;

        try {
            const response = await fetch('/api/gerar-dieta', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt: promptFinal, email: localStorage.getItem('email_verificacao') })
            });

            const result = await response.json();
            divResultado.innerText = result.dieta;
            divResultado.style.display = 'block';
            baixarPDF(result.dieta);
        } catch (e) { 
            alert("Erro: " + e.message);
        } finally {
            btn.innerText = "GERAR E BAIXAR PLANO";
            btn.disabled = false;
            statusTopo.style.display = 'none';
        }
    }

    function baixarPDF(conteudo) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const lines = doc.splitTextToSize(conteudo.replace(/[#*]/g, ''), 180);
        let y = 20;
        lines.forEach(line => {
            if (y > 275) { doc.addPage(); y = 20; }
            doc.text(line, 15, y);
            y += 7;
        });
        doc.save("Meu_Plano_Alimentar.pdf");
    }

    function limparDadosEApp() {
        localStorage.removeItem('rascunho_dieta');
        limparCamposVisualmente();
        document.getElementById('resultado').style.display = 'none';
    }

    function fecharModal() { document.getElementById('payment-overlay').style.display = 'none'; }
    function alternarBuscaRapida() { 
        const el = document.getElementById('area-busca-rapida');
        el.style.display = el.style.display === 'none' ? 'block' : 'none';
    }

        window.location.href = `https://buy.stripe.com/test_bJe7sLcqhcL0g0B9T9asg00?prefilled_email=${encodeURIComponent(email)}`;
